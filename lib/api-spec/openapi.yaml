openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ترنم مهر - سیستم هوشمند پایش سلامت روان و تحصیلی دانش‌آموزان
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: records
    description: Daily records
  - name: analysis
    description: AI analysis
  - name: exam
    description: Adaptive exam
  - name: admin
    description: Admin panel
  - name: stats
    description: Statistics and summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login or register with national code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged-in student
      responses:
        "200":
          description: Current student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /records:
    get:
      operationId: listRecords
      tags: [records]
      summary: List daily records for current student
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyRecord"
    post:
      operationId: createRecord
      tags: [records]
      summary: Create a new daily record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyRecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /records/{id}:
    get:
      operationId: getRecord
      tags: [records]
      summary: Get a single daily record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /records/extract-text:
    post:
      operationId: extractFromText
      tags: [records]
      summary: Extract anxiety/sleep/scores from free text via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractTextInput"
      responses:
        "200":
          description: Extracted values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedValues"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/{recordId}:
    get:
      operationId: getAnalysis
      tags: [analysis]
      summary: Get full AI analysis for a record (cached)
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/run:
    post:
      operationId: runAnalysis
      tags: [analysis]
      summary: Run AI analysis for a record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAnalysisInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam/generate:
    post:
      operationId: generateExam
      tags: [exam]
      summary: Generate adaptive exam based on student weaknesses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateExamInput"
      responses:
        "200":
          description: Exam questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam/submit:
    post:
      operationId: submitExam
      tags: [exam]
      summary: Submit exam answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamSubmitInput"
      responses:
        "200":
          description: Exam result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam/history:
    get:
      operationId: listExamHistory
      tags: [exam]
      summary: Get exam history for current student
      responses:
        "200":
          description: Exam sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamSession"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get summary stats for current student (averages, trends)
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/risk-trend:
    get:
      operationId: getRiskTrend
      tags: [stats]
      summary: Get risk level trend over last 14 days
      responses:
        "200":
          description: Risk trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskTrendPoint"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/students:
    get:
      operationId: listStudents
      tags: [admin]
      summary: List all students
      responses:
        "200":
          description: Students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"

  /admin/questions:
    get:
      operationId: listQuestions
      tags: [admin]
      summary: List all questions in the bank
      responses:
        "200":
          description: Questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [admin]
      summary: Add a question to the bank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /admin/questions/{id}:
    delete:
      operationId: deleteQuestion
      tags: [admin]
      summary: Delete a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings:
    get:
      operationId: getSettings
      tags: [admin]
      summary: Get admin settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
    patch:
      operationId: updateSettings
      tags: [admin]
      summary: Update admin settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"

  /admin/overview:
    get:
      operationId: getAdminOverview
      tags: [admin]
      summary: Admin dashboard overview (student counts, risk breakdown)
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Student:
      type: object
      properties:
        id:
          type: integer
        nationalCode:
          type: string
        fullName:
          type: string
        grade:
          type: ["string", "null"]
        schoolName:
          type: ["string", "null"]
        createdAt:
          type: string
        lastLogin:
          type: ["string", "null"]
      required: [id, nationalCode, fullName, createdAt]

    LoginInput:
      type: object
      properties:
        nationalCode:
          type: string
          minLength: 10
          maxLength: 10
        fullName:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        schoolName:
          type: ["string", "null"]
      required: [nationalCode]

    AuthResult:
      type: object
      properties:
        student:
          $ref: "#/components/schemas/Student"
        isNew:
          type: boolean
      required: [student, isNew]

    DailyRecord:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        recordDate:
          type: string
        mathScore:
          type: ["number", "null"]
        physicsScore:
          type: ["number", "null"]
        chemistryScore:
          type: ["number", "null"]
        biologyScore:
          type: ["number", "null"]
        anxietyLevel:
          type: ["integer", "null"]
        sleepHours:
          type: ["number", "null"]
        focusDrop:
          type: ["boolean", "null"]
        socialInteraction:
          type: ["integer", "null"]
        examDaysLeft:
          type: ["integer", "null"]
        freeText:
          type: ["string", "null"]
        riskLevel:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, studentId, recordDate, createdAt]

    DailyRecordInput:
      type: object
      properties:
        recordDate:
          type: string
        mathScore:
          type: ["number", "null"]
        physicsScore:
          type: ["number", "null"]
        chemistryScore:
          type: ["number", "null"]
        biologyScore:
          type: ["number", "null"]
        anxietyLevel:
          type: ["integer", "null"]
        sleepHours:
          type: ["number", "null"]
        focusDrop:
          type: ["boolean", "null"]
        socialInteraction:
          type: ["integer", "null"]
        examDaysLeft:
          type: ["integer", "null"]
        freeText:
          type: ["string", "null"]
      required: [recordDate]

    ExtractTextInput:
      type: object
      properties:
        text:
          type: string
      required: [text]

    ExtractedValues:
      type: object
      properties:
        anxietyLevel:
          type: ["integer", "null"]
        sleepHours:
          type: ["number", "null"]
        mathScore:
          type: ["number", "null"]
        physicsScore:
          type: ["number", "null"]
        chemistryScore:
          type: ["number", "null"]
        biologyScore:
          type: ["number", "null"]
        examDaysLeft:
          type: ["integer", "null"]
        summary:
          type: string
      required: [summary]

    AnalysisResult:
      type: object
      properties:
        id:
          type: integer
        recordId:
          type: integer
        ruleEngineOutput:
          type: ["string", "null"]
        interventionOutput:
          type: ["string", "null"]
        reportOutput:
          type: ["string", "null"]
        nlpOutput:
          type: ["string", "null"]
        riskLevel:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, recordId, createdAt]

    RunAnalysisInput:
      type: object
      properties:
        recordId:
          type: integer
      required: [recordId]

    Question:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        topic:
          type: ["string", "null"]
        difficulty:
          type: ["integer", "null"]
        text:
          type: string
        optionA:
          type: string
        optionB:
          type: string
        optionC:
          type: string
        optionD:
          type: string
        correctAnswer:
          type: string
        explanation:
          type: ["string", "null"]
      required: [id, subject, text, optionA, optionB, optionC, optionD, correctAnswer]

    QuestionInput:
      type: object
      properties:
        subject:
          type: string
        topic:
          type: ["string", "null"]
        difficulty:
          type: ["integer", "null"]
        text:
          type: string
        optionA:
          type: string
        optionB:
          type: string
        optionC:
          type: string
        optionD:
          type: string
        correctAnswer:
          type: string
        explanation:
          type: ["string", "null"]
      required: [subject, text, optionA, optionB, optionC, optionD, correctAnswer]

    GenerateExamInput:
      type: object
      properties:
        count:
          type: integer
          default: 10
      required: []

    ExamSubmitInput:
      type: object
      properties:
        sessionId:
          type: string
        answers:
          type: array
          items:
            $ref: "#/components/schemas/ExamAnswer"
      required: [sessionId, answers]

    ExamAnswer:
      type: object
      properties:
        questionId:
          type: integer
        chosen:
          type: string
      required: [questionId, chosen]

    ExamResult:
      type: object
      properties:
        sessionId:
          type: string
        totalQuestions:
          type: integer
        correctCount:
          type: integer
        score:
          type: number
        subjectBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/SubjectScore"
      required: [sessionId, totalQuestions, correctCount, score, subjectBreakdown]

    SubjectScore:
      type: object
      properties:
        subject:
          type: string
        total:
          type: integer
        correct:
          type: integer
      required: [subject, total, correct]

    ExamSession:
      type: object
      properties:
        sessionId:
          type: string
        score:
          type: number
        totalQuestions:
          type: integer
        correctCount:
          type: integer
        createdAt:
          type: string
      required: [sessionId, score, totalQuestions, correctCount, createdAt]

    StatsSummary:
      type: object
      properties:
        avgMath:
          type: ["number", "null"]
        avgPhysics:
          type: ["number", "null"]
        avgChemistry:
          type: ["number", "null"]
        avgBiology:
          type: ["number", "null"]
        avgAnxiety:
          type: ["number", "null"]
        avgSleep:
          type: ["number", "null"]
        totalRecords:
          type: integer
        lastRiskLevel:
          type: ["string", "null"]
        weakestSubject:
          type: ["string", "null"]
      required: [totalRecords]

    RiskTrendPoint:
      type: object
      properties:
        date:
          type: string
        riskLevel:
          type: string
        anxietyLevel:
          type: ["integer", "null"]
      required: [date, riskLevel]

    AdminLoginInput:
      type: object
      properties:
        password:
          type: string
      required: [password]

    AdminAuthResult:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
      required: [success, token]

    AdminSettings:
      type: object
      properties:
        adminPassword:
          type: ["string", "null"]
        aiModel:
          type: string
        minResponseLength:
          type: integer
      required: [aiModel, minResponseLength]

    AdminSettingsUpdate:
      type: object
      properties:
        adminPassword:
          type: ["string", "null"]
        aiModel:
          type: ["string", "null"]
        minResponseLength:
          type: ["integer", "null"]

    AdminOverview:
      type: object
      properties:
        totalStudents:
          type: integer
        totalRecords:
          type: integer
        riskBreakdown:
          type: object
          properties:
            green:
              type: integer
            yellow:
              type: integer
            orange:
              type: integer
            red:
              type: integer
          required: [green, yellow, orange, red]
        recentStudents:
          type: array
          items:
            $ref: "#/components/schemas/Student"
      required: [totalStudents, totalRecords, riskBreakdown, recentStudents]
